services:
  aggregator:
    build: ./aggregator
    image: uas-log-aggregator:latest
    environment:
      DATABASE_PATH: /var/lib/aggregator/aggregator.db
      WORKER_COUNT: 4
      LOG_LEVEL: INFO
    ports:
      - "8080:8080"
    volumes:
      - aggregator_data:/var/lib/aggregator
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - uas_net

  publisher:
    build: ./publisher
    image: uas-log-publisher:latest
    depends_on:
      aggregator:
        condition: service_healthy
    environment:
      TARGET_URL: http://aggregator:8080/publish
      EVENT_COUNT: 20000
      DUPLICATE_RATE: 0.30
      BATCH_SIZE: 500
      PUBLISH_CONCURRENCY: 4
    networks:
      - uas_net
    profiles:
      - tools

networks:
  uas_net:
    driver: bridge

volumes:
  aggregator_data:
